<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Not Found</title>
    <meta name="description" content="Page not found.">
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            padding: 3rem 2rem;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #050608;
            color: #f5f5f5;
            line-height: 1.55;
        }
        main {
            max-width: 880px;
            margin: 0 auto;
            display: grid;
            gap: 3.5rem;
        }
        h1 {
            margin: 0 0 1rem;
            font-size: 2.4rem;
            letter-spacing: 0.03em;
            font-weight: 600;
        }
        p {
            margin: 0 0 1.2rem;
            color: #b3b3b3;
            max-width: 70ch;
        }
        footer {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #5f6475;
        }
        footer a {
            color: #8b8fa0;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<main>

    <section>
        <h1>404</h1>
        <p>
            The page you're looking for doesn't exist.  
            It may have moved, or it never existed at all.
        </p>
        <p>
            Arcunox keeps things simple — no redirects, no tracking, no noise.  
            If you ended up here, the path is just wrong.
        </p>
    </section>

    <div>No tracking . No analytics . All client-side</div>

    <section>
        <footer>
            <nav>
                <a href="/">home</a><br>
                <a href="/documentation/">documentation</a><br>
                <a href="/privacy/">privacy</a><br>
                <a href="/philosophy/">philosophy</a><br>
                <a href="https://github.com/arcunox">github</a>
            </nav>
        </footer>
    </section>

</main>

</body>
</html>
