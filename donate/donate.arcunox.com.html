  <style>
html {

  width: 100%;
  height: 100%;
  background: #050609;
  color: #f5f5f5;
  font-family: system-ui, -apple-system, BlinkMacSystemFont,
               "SF Pro Text", "Segoe UI", sans-serif;
  box-sizing: border-box;
}

*, *::before, *::after {
  box-sizing: inherit;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 40px;
  margin: 0;
}

#app {
  width: 1080px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.titlebar {
  width: 100%;
  padding: 14px 0;
  text-align: center;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 13px;
  color: #888;
  border-bottom: 1px solid #222;
  margin-bottom: 40px;
}

.plate {
  width: 510px;
  padding: 32px;
  background: #0b0c10;
  border: 1px solid #222;
}

.wrap {
  width: 100%;
}

.title {
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 14px;
  color: #888;
  margin-bottom: 18px;
}

.row {
  margin-bottom: 16px;
}

label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #777;
  margin-bottom: 6px;
}

.output {
  font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas,
               "Liberation Mono", monospace;
  font-size: 13px;
  padding: 10px;
  background: #0b0c10;
  border: 1px solid #333;
  min-height: 38px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  word-break: break-all;
}

.output span {
  flex: 1;
}

.copy-btn {
  border: 1px solid #333;
  background: transparent;
  color: #aaa;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 4px 6px;
  cursor: pointer;
  white-space: nowrap;
  min-width: 62px;
  text-align: center;
}

.footnote {
  margin-top: 16px;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #555;
}
  </style>
</head>

<body>
<div id="app">

  <div class="titlebar">Arcunox / Donate</div>

  <div class="plate">
    <div class="wrap">

      <div class="title">Cryptocurrency</div>

      <div class="row">
        <label>Solana (SOL)</label>
        <div class="output">
          <span id="solOutput">55hVRWzM5WM4oYyQbBvr3yGQgC6mM31wgafyMhfsQttx</span>
          <button class="copy-btn">Copy</button>
        </div>
      </div>

    </div>
  </div>

  <div class="footnote">No logs. No analytics. All client‑side.</div>

</div>

<!-- COPY BUTTON -->
<script>
document.querySelectorAll(".copy-btn").forEach(btn => {
  btn.addEventListener("click", async () => {
    const target = btn.previousElementSibling;
    const text = target.textContent.trim();
    if (!text) return;

    try {
      await navigator.clipboard.writeText(text);
      const original = btn.textContent;
      btn.textContent = "Copied";
      setTimeout(() => (btn.textContent = original), 900);
    } catch (e) {}
  });
});
</script>
</body>
