<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your User-Agent</title>
    <meta name="description" content="Minimal, privacy-first User-Agent viewer. No tracking. No analytics. No dependencies.">
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            padding: 2rem;
            font-family: system-ui, sans-serif;
            background: #050608;
            color: #f5f5f5;
            line-height: 1.6;
        }
        main {
            max-width: 880px;
            margin: auto;
            display: grid;
            gap: 2.5rem;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.04em;
        }
        p {
            color: #b3b3b3;
            max-width: 60ch;
            white-space: pre-line;
        }
        .panel {
            border: 1px solid #262833;
            background: radial-gradient(circle at top left, #151824 0, #050608 55%);
            padding: 1.25rem 1.5rem;
        }
        .ua {
            font-family: ui-monospace, monospace;
            font-size: 1rem;
            padding: 1rem 0;
            word-break: break-all;
            color: #f5f5f5;
        }
        footer {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #5f6475;
        }
        footer a {
            color: #8b8fa0;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <main>

        <section>
            <h1>Your User-Agent</h1>
            <p>
Displayed directly from your browser with no processing.
All logic runs locally using client-side code only.
No tracking, no analytics, no network calls.
            </p>
        </section>

        <section class="panel">
            <div class="ua" id="ua">Loading…</div>
        </section>

        <!-- UNIVERSAL FOOTER -->
        <section>
            <br><br>
            <footer>
              <nav>
                <a href="/">home</a><br>
                <a href="/documentation/">documentation</a><br>
                <a href="/privacy/">privacy</a><br>
                <a href="/philosophy/">philosophy</a><br>
                <a href="https://github.com/arcunox">github</a>
              </nav>
            </footer>
        </section>

    </main>

    <script>
        document.getElementById('ua').textContent = navigator.userAgent;
    </script>
</body>
</html>
