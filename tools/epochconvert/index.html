<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unix Timestamp Converter</title>
    <meta name="description" content="Convert Unix timestamps to human-readable time and back. No tracking. No analytics. No dependencies.">
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            padding: 2rem;
            font-family: system-ui, sans-serif;
            background: #050608;
            color: #f5f5f5;
            line-height: 1.6;
        }
        main {
            max-width: 880px;
            margin: auto;
            display: grid;
            gap: 2.5rem;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.04em;
        }
        p {
            color: #b3b3b3;
            max-width: 60ch;
            white-space: pre-line;
        }
        .panel {
            border: 1px solid #262833;
            background: radial-gradient(circle at top left, #151824 0, #050608 55%);
            padding: 1.25rem 1.5rem;
        }
        .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #8b8fa0;
            margin-bottom: 0.5rem;
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            box-sizing: border-box;
            border: 1px solid #303344;
            background: #05060a;
            color: #f5f5f5;
            font-family: ui-monospace, monospace;
            font-size: 0.9rem;
        }
        input:focus, textarea:focus {
            outline: 1px solid #4f7dff;
            border-color: #4f7dff;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }
        button {
            padding: 0.55rem 1.1rem;
            font-size: 0.9rem;
            border: 1px solid #f5f5f5;
            background: transparent;
            color: #f5f5f5;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        button:hover {
            background: #f5f5f5;
            color: #050608;
        }
        footer {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #5f6475;
        }
        footer a {
            color: #8b8fa0;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <main>

        <section>
            <h1>Unix Timestamp Converter</h1>
            <p>
Convert Unix timestamps to human-readable time and back.
All processing happens locally using client-side code.
No tracking, no analytics, no network calls.
            </p>
        </section>

        <!-- Timestamp → Human -->
        <section class="panel">
            <div class="label">Timestamp → Human</div>
            <input id="tsInput" placeholder="Enter Unix timestamp (seconds or milliseconds)…">

            <div class="controls">
                <button id="tsConvert">Convert</button>
                <button id="tsClear">Clear</button>
            </div>

            <textarea id="tsOutput" readonly placeholder="Human-readable time will appear here."></textarea>
        </section>

        <!-- Human → Timestamp -->
        <section class="panel">
            <div class="label">Human → Timestamp</div>
            <input id="dateInput" placeholder="Enter date/time (e.g. 2026-04-11 12:34:56)…">

            <div class="controls">
                <button id="dateConvert">Convert</button>
                <button id="dateClear">Clear</button>
            </div>

            <textarea id="dateOutput" readonly placeholder="Unix timestamp will appear here."></textarea>
        </section>

        <!-- UNIVERSAL FOOTER -->
        <section>
            <br><br>
            <footer>
              <nav>
                <a href="/">home</a><br>
                <a href="/documentation/">documentation</a><br>
                <a href="/privacy/">privacy</a><br>
                <a href="/philosophy/">philosophy</a><br>
                <a href="https://github.com/arcunox">github</a>
              </nav>
            </footer>
        </section>

    </main>

    <script>
        const tsInput = document.getElementById("tsInput");
        const tsOutput = document.getElementById("tsOutput");

        const dateInput = document.getElementById("dateInput");
        const dateOutput = document.getElementById("dateOutput");

        // Timestamp → Human
        document.getElementById("tsConvert").onclick = () => {
            const raw = tsInput.value.trim();
            if (!raw) return;

            let ts = Number(raw);

            if (isNaN(ts)) {
                tsOutput.value = "Invalid timestamp.";
                return;
            }

            // Detect seconds vs milliseconds
            if (raw.length <= 10) ts *= 1000;

            const d = new Date(ts);

            if (isNaN(d.getTime())) {
                tsOutput.value = "Invalid timestamp.";
                return;
            }

            tsOutput.value =
                "Local:   " + d.toLocaleString([], { hour12: false }) + "\n" +
                "UTC:     " + d.toUTCString() + "\n" +
                "ISO8601: " + d.toISOString();
        };

        document.getElementById("tsClear").onclick = () => {
            tsInput.value = "";
            tsOutput.value = "";
        };

        // Human → Timestamp
        document.getElementById("dateConvert").onclick = () => {
            const raw = dateInput.value.trim();
            if (!raw) return;

            const d = new Date(raw);

            if (isNaN(d.getTime())) {
                dateOutput.value = "Invalid date/time.";
                return;
            }

            dateOutput.value =
                "Seconds:      " + Math.floor(d.getTime() / 1000) + "\n" +
                "Milliseconds: " + d.getTime();
        };

        document.getElementById("dateClear").onclick = () => {
            dateInput.value = "";
            dateOutput.value = "";
        };
    </script>
</body>
</html>
