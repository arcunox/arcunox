<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter & Validator</title>
    <meta name="description" content="Minimal, privacy-first JSON formatter and validator. No tracking. No analytics. No dependencies.">
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            padding: 2rem;
            font-family: system-ui, sans-serif;
            background: #050608;
            color: #f5f5f5;
            line-height: 1.6;
        }
        main {
            max-width: 880px;
            margin: auto;
            display: grid;
            gap: 2.5rem;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.04em;
        }
        p {
            color: #b3b3b3;
            max-width: 60ch;
            white-space: pre-line;
        }
        .panel {
            border: 1px solid #262833;
            background: radial-gradient(circle at top left, #151824 0, #050608 55%);
            padding: 1.25rem 1.5rem;
        }
        .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #8b8fa0;
            margin-bottom: 0.5rem;
        }
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 0.75rem;
            box-sizing: border-box;
            border: 1px solid #303344;
            background: #05060a;
            color: #f5f5f5;
            resize: vertical;
            font-family: ui-monospace, monospace;
            font-size: 0.9rem;
        }
        textarea:focus {
            outline: 1px solid #4f7dff;
            border-color: #4f7dff;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }
        button {
            padding: 0.55rem 1.1rem;
            font-size: 0.9rem;
            border: 1px solid #f5f5f5;
            background: transparent;
            color: #f5f5f5;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        button:hover {
            background: #f5f5f5;
            color: #050608;
        }
        .status {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #8b8fa0;
        }
        footer {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #5f6475;
        }
        footer a {
            color: #8b8fa0;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <main>

        <section>
            <h1>JSON Formatter & Validator</h1>
            <p>
Paste JSON to format, validate, and inspect it.
All processing happens locally using client-side code.
No tracking, no analytics, no network calls.
            </p>
        </section>

        <section class="panel">
            <div class="label">Input JSON</div>
            <textarea id="input" placeholder="Paste JSON here…"></textarea>

            <div class="controls">
                <button id="format">Format</button>
                <button id="minify">Minify</button>
                <button id="clear">Clear</button>
            </div>

            <div class="status" id="status">Status: waiting for input</div>
        </section>

        <section class="panel">
            <div class="label">Output</div>
            <textarea id="output" readonly placeholder="Formatted or minified JSON will appear here."></textarea>

            <div class="controls">
                <button id="copy">Copy</button>
            </div>
        </section>

        <!-- UNIVERSAL FOOTER -->
        <section>
            <br><br>
            <footer>
              <nav>
                <a href="/">home</a><br>
                <a href="/documentation/">documentation</a><br>
                <a href="/privacy/">privacy</a><br>
                <a href="/philosophy/">philosophy</a><br>
                <a href="https://github.com/arcunox">github</a>
              </nav>
            </footer>
        </section>

    </main>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        function validateJSON(text) {
            try {
                const parsed = JSON.parse(text);
                return { valid: true, parsed };
            } catch (e) {
                return { valid: false, error: e.message };
            }
        }

        document.getElementById('format').onclick = () => {
            const raw = input.value.trim();
            if (!raw) {
                output.value = '';
                status.textContent = 'Status: no input';
                return;
            }

            const result = validateJSON(raw);
            if (!result.valid) {
                output.value = '';
                status.textContent = 'Invalid JSON: ' + result.error;
                return;
            }

            output.value = JSON.stringify(result.parsed, null, 4);
            status.textContent = 'Valid JSON ✓ formatted';
        };

        document.getElementById('minify').onclick = () => {
            const raw = input.value.trim();
            if (!raw) {
                output.value = '';
                status.textContent = 'Status: no input';
                return;
            }

            const result = validateJSON(raw);
            if (!result.valid) {
                output.value = '';
                status.textContent = 'Invalid JSON: ' + result.error;
                return;
            }

            output.value = JSON.stringify(result.parsed);
            status.textContent = 'Valid JSON ✓ minified';
        };

        document.getElementById('clear').onclick = () => {
            input.value = '';
            output.value = '';
            status.textContent = 'Status: waiting for input';
        };

        document.getElementById('copy').onclick = async () => {
            if (!output.value) return;
            try {
                await navigator.clipboard.writeText(output.value);
            } catch (e) {}
        };
    </script>
</body>
</html>
