<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your IP Address</title>
    <meta name="description" content="Minimal, privacy-first IP address viewer. No tracking. No analytics. No dependencies.">
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            padding: 2rem;
            font-family: system-ui, sans-serif;
            background: #050608;
            color: #f5f5f5;
            line-height: 1.6;
        }
        main {
            max-width: 880px;
            margin: auto;
            display: grid;
            gap: 1.5rem;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.04em;
        }
        p { color: #b3b3b3; }

        .panel {
            border: 1px solid #262833;
            background: radial-gradient(circle at top left, #151824 0, #050608 55%);
            padding: 1.25rem 1.5rem;
        }

        .ip {
            font-family: ui-monospace, monospace;
            font-size: 1.5rem;
            padding: 1rem 0;
            word-break: break-all;
            color: #f5f5f5;
        }

        footer {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #5f6475;
        }
    </style>
</head>

<body>
    <main>
        <section>
            <h1>Your IP Address</h1>
            <p>Displayed locally using Cloudflare's connection metadata. No tracking, no analytics, no logs.</p>
        </section>

        <section class="panel">
            <div class="ip" id="ip">Loading…</div>
        </section>

        <footer>No tracking. No analytics. No cookies. No logs.</footer>
    </main>

    <script>
        fetch('/cdn-cgi/trace')
            .then(r => r.text())
            .then(t => {
                const ipLine = t.split('\n').find(line => line.startsWith('ip='));
                const ip = ipLine ? ipLine.replace('ip=', '') : 'Unavailable';
                document.getElementById('ip').textContent = ip;
            })
            .catch(() => {
                document.getElementById('ip').textContent = 'Unavailable';
            });
    </script>
</body>
</html>
