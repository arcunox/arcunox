<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encode / Decode</title>
    <meta name="description" content="Minimal, privacy-first Base64 encoder and decoder. No tracking. No analytics. No dependencies.">
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            padding: 2rem;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #050608;
            color: #f5f5f5;
            line-height: 1.6;
        }
        main {
            max-width: 880px;
            margin: 0 auto;
            display: grid;
            gap: 2.5rem;
        }
        h1 {
            margin: 0 0 0.5rem;
            font-size: 1.9rem;
            letter-spacing: 0.04em;
        }
        p {
            margin: 0 0 1rem;
            color: #b3b3b3;
            max-width: 60ch;
            white-space: pre-line; /* allows natural line breaks */
        }
        .panel {
            border: 1px solid #262833;
            background: radial-gradient(circle at top left, #151824 0, #050608 55%);
            padding: 1.25rem 1.5rem;
        }
        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }
        .label-row span {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #8b8fa0;
        }
        textarea {
            width: 100%;
            min-height: 140px;
            padding: 0.75rem;
            box-sizing: border-box;
            border: 1px solid #303344;
            background: #05060a;
            color: #f5f5f5;
            resize: vertical;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.9rem;
        }
        textarea:focus {
            outline: 1px solid #4f7dff;
            border-color: #4f7dff;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
            margin-top: 0.75rem;
        }
        button {
            padding: 0.55rem 1.1rem;
            font-size: 0.9rem;
            border: 1px solid #f5f5f5;
            background: transparent;
            color: #f5f5f5;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        button:hover {
            background: #f5f5f5;
            color: #050608;
        }
        .mode-toggle {
            display: inline-flex;
            border: 1px solid #303344;
        }
        .mode-toggle button {
            border: none;
            border-right: 1px solid #303344;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.8rem;
            padding: 0.45rem 0.9rem;
            background: transparent;
            color: #8b8fa0;
        }
        .mode-toggle button:last-child {
            border-right: none;
        }
        .mode-toggle button.active {
            background: #f5f5f5;
            color: #050608;
        }
        .note {
            font-size: 0.8rem;
            color: #7b7f90;
        }
        footer {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #5f6475;
        }
        footer a {
            color: #8b8fa0;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>

        <section>
            <h1>Base64 Encode / Decode</h1>
            <p>
A deterministic, client-side Base64 transformer.
All work happens in your browser.
No tracking, no analytics, no network calls.
            </p>
        </section>

        <section class="panel">
            <div class="label-row">
                <span>Input</span>
                <div class="mode-toggle" aria-label="Mode">
                    <button type="button" id="mode-encode" class="active">Encode</button>
                    <button type="button" id="mode-decode">Decode</button>
                </div>
            </div>
            <textarea id="input" placeholder="Type or paste text here…"></textarea>
            <div class="controls">
                <button type="button" id="run">Run</button>
                <button type="button" id="clear">Clear</button>
                <span class="note" id="mode-note">Mode: text → Base64</span>
            </div>
        </section>

        <section class="panel">
            <div class="label-row">
                <span>Output</span>
            </div>
            <textarea id="output" readonly placeholder="Result will appear here."></textarea>
            <div class="controls">
                <button type="button" id="copy">Copy</button>
                <span class="note">No logs. No storage. Output exists only in this page.</span>
            </div>
        </section>

        <!-- UNIVERSAL FOOTER -->
        <section>
            <br><br>
            <footer>
              <nav>
                <a href="/">home</a><br>
                <a href="/documentation/">documentation</a><br>
                <a href="/privacy/">privacy</a><br>
                <a href="/philosophy/">philosophy</a><br>
                <a href="https://github.com/arcunox">github</a>
              </nav>
            </footer>
        </section>

    </main>

    <script>
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const runBtn = document.getElementById('run');
        const clearBtn = document.getElementById('clear');
        const copyBtn = document.getElementById('copy');
        const modeEncodeBtn = document.getElementById('mode-encode');
        const modeDecodeBtn = document.getElementById('mode-decode');
        const modeNote = document.getElementById('mode-note');

        let mode = 'encode';

        function setMode(next) {
            mode = next;
            if (mode === 'encode') {
                modeEncodeBtn.classList.add('active');
                modeDecodeBtn.classList.remove('active');
                modeNote.textContent = 'Mode: text → Base64';
            } else {
                modeDecodeBtn.classList.add('active');
                modeEncodeBtn.classList.remove('active');
                modeNote.textContent = 'Mode: Base64 → text';
            }
            outputEl.value = '';
        }

        // Modern UTF‑8 safe Base64
        function encodeBase64(str) {
            const bytes = new TextEncoder().encode(str);
            let binary = "";
            bytes.forEach(b => binary += String.fromCharCode(b));
            return btoa(binary);
        }

        function decodeBase64(str) {
            const binary = atob(str);
            const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
            return new TextDecoder().decode(bytes);
        }

        runBtn.addEventListener('click', () => {
            const value = inputEl.value;
            if (!value) {
                outputEl.value = '';
                return;
            }
            try {
                outputEl.value = mode === 'encode'
                    ? encodeBase64(value)
                    : decodeBase64(value);
            } catch (e) {
                outputEl.value = 'Error: invalid input for current mode.';
            }
        });

        clearBtn.addEventListener('click', () => {
            inputEl.value = '';
            outputEl.value = '';
        });

        copyBtn.addEventListener('click', async () => {
            if (!outputEl.value) return;
            try {
                await navigator.clipboard.writeText(outputEl.value);
            } catch (e) {}
        });

        modeEncodeBtn.addEventListener('click', () => setMode('encode'));
        modeDecodeBtn.addEventListener('click', () => setMode('decode'));
    </script>
</body>
</html>
